<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nachricht gesendet</title>
  <style>
    body { font-family: 'Inter', sans-serif; margin:0; min-height:100vh; display:flex; align-items:center; justify-content:center; background:#f7f4ee; color:#1c3a2a; }
    .card { max-width: 520px; width: 100%; margin: 24px; padding: 36px; background:#ffffff; border:1px solid #d8d0c0; box-shadow:0 18px 40px rgba(17,17,17,0.08); }
    h1 { margin-bottom: 16px; font-size: 2rem; }
    p { line-height:1.7; margin-bottom:24px; }
    a { display:inline-block; padding: 14px 24px; background:#3d6b4f; color:#ffffff; text-decoration:none; font-weight:600; letter-spacing:0.04em; }
    a:hover { background:#1c3a2a; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Danke!</h1>
    <p>Ihre Nachricht wurde erfolgreich abgeschickt. Wir haben die Anfrage zur Prüfung erhalten und melden uns schnellstmöglich bei Ihnen.</p>
    <a href="index.html">Zurück zur Website</a>
  </div>
</body>
</html>
